
{% extends "base.html" %}
{% block content %}

<a href="/joint-missions" class="btn-primary">← Back to Joint Missions</a>

<h1>{{ mission["Mission Title"] }}</h1>

<div class="card">
  <h2>Mission Details</h2>
  <table class="table">
    <tbody>
      {% for k, v in mission.items() %}
        {% if k != "_type" %}
        <tr>
          <td style="width:280px; font-weight:700;">{{ k }}</td>
          <td>{{ v }}</td>
        </tr>
        {% endif %}
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
